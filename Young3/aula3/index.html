<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista De Tarefas</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body id="body" class="flex items-center justify-center w-screen h-screen">
    <div id="aa" class="flex flex-col w-2xl">
        <h1 class="text-3xl font-bold flex items-center justify-center">Lista de Tarefas</h1>
        <div class="flex flex-row justify-center">
            <input class="input input-primary m-2" type="text" name="placeholder" id="input-list">
            <button class="btn btn-primary m-2" id="add">Adicionar</button>
            <button class="btn btn-primary m-2" id="Remover">Remover</button>
        </div>
        <div class="flex flex-col items-center p-3">
            <ul id="list"></ul>
        </div>
    </div>
    
    <script src="./script.js" defer></script>
</body>
</html>
