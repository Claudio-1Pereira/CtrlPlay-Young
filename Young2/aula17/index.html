<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">
    <title>Calculadora</title>
</head>
<body class="flex justify-center flex-col items-center w-screen h-screen">
    <h1 class="font-bold text-4xl">Calculadora</h1>
    <p id="display" class="text-3xl mt-4 bg-gray-200 text-black px-4 py-2 w-64 text-right rounded font-bold h-10"></p>
    <div class="grid grid-cols-4 gap-2 mt-7">
        <button data-value="1" class="btn btn-soft text-4xl h-16 h-16">1</button>
        <button data-value="2" class="btn btn-soft text-4xl h-16 h-16">2</button>
        <button data-value="3" class="btn btn-soft text-4xl h-16 h-16">3</button>
        <button data-value="+" class="btn btn-soft text-4xl h-16 h-16">+</button>
        <button data-value="4" class="btn btn-soft text-4xl h-16 h-16">4</button>
        <button data-value="5" class="btn btn-soft text-4xl h-16 h-16">5</button>
        <button data-value="6" class="btn btn-soft text-4xl h-16 h-16">6</button>
        <button data-value="-" class="btn btn-soft text-4xl h-16 h-16">-</button>
        <button data-value="7" class="btn btn-soft text-4xl h-16 h-16">7</button>
        <button data-value="8" class="btn btn-soft text-4xl h-16 h-16">8</button>
        <button data-value="9" class="btn btn-soft text-4xl h-16 h-16">9</button>
        <button data-value="*" class="btn btn-soft text-4xl h-16 h-16">*</button>
        <button data-value="/" class="btn btn-soft text-4xl h-16 h-16">/</button>
        <button data-value="0" class="btn btn-soft text-4xl h-16 h-16">0</button>
        <button data-value="=" class="btn btn-soft text-4xl h-16 h-16">=</button>
        <button data-value="C" class="btn btn-soft text-4xl h-16 h-16">C</button>
        
    </div>
    <script src="./script.js" defer></script>
</body>
</html>
